<!DOCTYPE html>
<html data-bs-theme="dark" lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Ai8V</title>
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="../../assets/img/fav180.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/img/fav16.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/img/fav16D.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/img/fav32.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/img/fav32D.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="180x180" href="../../assets/img/fav180.png">
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/Inter.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/courses.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
</head>

<body>
  <!-- تخطّي إلى المحتوى -->
  <a href="#main-content" class="skip-link">تخطّي إلى المحتوى الرئيسي</a>

  <main id="main-content" class="page-container">

    <!-- ── ترويسة الصفحة ── -->
    <header class="page-header">
      <div class="d-flex align-items-start justify-content-between flex-wrap gap-2">
        <div>
          <h1 class="page-title">استكشف الدورات</h1>
          <nav class="breadcrumb-nav" aria-label="مسار التنقل">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a id="breadcrumb-home" href="/ar/index.html">الرئيسية</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                <span id="breadcrumb-current">الدورات</span>
              </li>
            </ol>
          </nav>
        </div>
        <div id="page-header-lang-slot" class="d-flex align-items-center"></div>
      </div>
    </header>

    <!-- ── التخطيط ── -->
    <div class="row g-4">

      <!-- الشريط الجانبي — سطح المكتب -->
      <aside id="desktop-filters-slot"
             class="col-lg-3 d-none d-lg-block sidebar"
             aria-label="فلاتر الدورات">
      </aside>

      <!-- منطقة المحتوى -->
      <div id="content-area" class="col-lg-9">

        <!-- شريط الأدوات -->
        <div class="toolbar" role="search">
          <p id="results-text"
             class="results-text mb-0"
             aria-live="polite"
             aria-atomic="true">جارٍ التحميل</p>

          <div class="d-flex align-items-center gap-2">
            <label id="search-label" class="visually-hidden" for="search-input">
              البحث في الدورات
            </label>
            <input id="search-input"
                   class="search-input"
                   type="search"
                   placeholder="البحث في الدورات"
                   autocomplete="off"
                   aria-label="البحث في الدورات">

            <div class="dropdown">
              <button id="sort-dropdown"
                      class="btn sort-toggle dropdown-toggle"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                      aria-label="ترتيب الدورات">
                <span class="d-none d-sm-inline sort-label">متوسط التقييمات</span>
                <i class="d-sm-none bi bi-sort-down" aria-hidden="true"></i>
              </button>
              <ul id="sort-dropdown-menu"
                  class="dropdown-menu sort-menu dropdown-menu-end"
                  role="menu"
                  aria-label="خيارات الترتيب">
              </ul>
            </div>
          </div>
        </div>

        <!-- شبكة الدورات -->
        <h2 class="visually-hidden" id="courses-list-heading">نتائج الدورات</h2>
        <div id="courses-grid"
             class="row g-4"
             aria-live="polite"
             aria-atomic="true">
        </div>

        <!-- التنقل بين الصفحات -->
        <nav aria-label="صفحات الدورات">
          <ul id="pagination-bar"
              class="pagination justify-content-center mt-4 gap-2">
          </ul>
        </nav>

      </div>
    </div>

  </main><!-- /#main-content -->


  <!-- ── فلاتر الجوال ── -->
  <div id="offcanvas-filters"
       class="offcanvas offcanvas-end mobile-offcanvas"
       tabindex="-1"
       aria-labelledby="offcanvas-title">
    <div class="offcanvas-header">
      <h2 id="offcanvas-title" class="offcanvas-title">الفلاتر</h2>
      <button class="btn-close"
              type="button"
              data-bs-dismiss="offcanvas"
              aria-label="إغلاق الفلاتر"></button>
    </div>
    <div id="mobile-filters-slot" class="offcanvas-body"></div>
  </div>


  <!-- ── زر الفلاتر العائم — الجوال ── -->
  <button id="floating-filter-btn"
          class="d-lg-none floating-fab"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvas-filters"
          aria-label="فتح فلاتر الدورات"
          aria-controls="offcanvas-filters">
    <i class="bi bi-funnel-fill" aria-hidden="true"></i>
  </button>


  <!-- ── حاوية الإشعارات ── -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3"
       aria-live="polite"
       aria-atomic="true">
  </div>
    <script src="../../assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/courses-data.js"></script>
    <script src="../../assets/js/shared-page.js"></script>
    <script src="../../assets/js/courses-app.js"></script>
    <script src="../../assets/js/ratings-system.js"></script>
</body>

</html>
